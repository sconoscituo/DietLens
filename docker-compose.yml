# DietLens Docker Compose 설정
services:
  dietlens:
    build: .
    container_name: dietlens_app
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:///./dietlens.db
    volumes:
      - ./uploads:/app/uploads          # 업로드 이미지 영속화
      - ./dietlens.db:/app/dietlens.db  # SQLite DB 영속화
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
