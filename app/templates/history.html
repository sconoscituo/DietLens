{% extends "base.html" %}
{% block title %}기록 히스토리{% endblock %}

{% block content %}
<div class="space-y-6">

  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">📋 식단 히스토리</h1>
      <p class="text-gray-500 text-sm mt-1">최근 식사 기록을 확인하세요</p>
    </div>
    <div class="flex items-center gap-2">
      <select id="periodSelect" onchange="loadHistory()"
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        <option value="7">최근 7일</option>
        <option value="14">최근 14일</option>
        <option value="30" selected>최근 30일</option>
        <option value="90">최근 90일</option>
      </select>
    </div>
  </div>

  <!-- 주간 요약 차트 -->
  <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
    <h2 class="font-semibold text-gray-700 mb-4">칼로리 추이</h2>
    <div style="height: 200px">
      <canvas id="historyChart"></canvas>
    </div>
  </div>

  <!-- 히스토리 목록 -->
  <div id="historyList" class="space-y-4">
    <div class="text-center py-10 text-gray-300">
      <div class="animate-spin text-3xl mb-2">⏳</div>
      <p>로딩 중...</p>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
  let historyChart = null;

  async function loadHistory() {
    const days = document.getElementById('periodSelect').value;
    const res = await fetch(`/api/reports/history?days=${days}`);
    const data = await res.json();
    renderHistory(data);
    renderHistoryChart(data);
  }

  function renderHistory(data) {
    const container = document.getElementById('historyList');
    if (!data || data.length === 0) {
      container.innerHTML = `
        <div class="bg-white rounded-2xl p-10 text-center text-gray-300 shadow-sm border border-gray-100">
          <span class="text-5xl block mb-3">🍽️</span>
          <p>기록된 식사가 없습니다</p>
          <a href="/log" class="mt-4 inline-block text-emerald-500 text-sm hover:underline">식사 기록하기 →</a>
        </div>`;
      return;
    }

    container.innerHTML = data.map(day => {
      const mealIcons = { '아침': '🌅', '점심': '☀️', '저녁': '🌙', '간식': '🍎' };
      const mealsHtml = day.meals.map(meal => `
        <div class="flex items-start justify-between py-2 border-b border-gray-50 last:border-0">
          <div class="flex items-center gap-2">
            <span class="text-lg">${mealIcons[meal.meal_type] || '🍽️'}</span>
            <div>
              <p class="text-sm font-medium text-gray-700">${escapeHtml(String(meal.meal_type))}</p>
              <p class="text-xs text-gray-400">${meal.items.map(i => escapeHtml(String(i.name))).join(', ')}</p>
            </div>
          </div>
          <div class="text-right flex items-center gap-2">
            <p class="text-sm font-bold text-emerald-600">${Math.round(meal.calories)} kcal</p>
            <button onclick="deleteMeal(${meal.id}, this)"
              class="text-red-300 hover:text-red-500 text-xs px-2 py-1 rounded hover:bg-red-50 transition">삭제</button>
          </div>
        </div>
      `).join('');

      return `
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4 border-b border-gray-50">
            <div>
              <p class="font-semibold text-gray-800">${day.date}</p>
              <p class="text-xs text-gray-400">${day.meals.length}끼 식사</p>
            </div>
            <div class="text-right">
              <p class="text-lg font-bold text-emerald-600">${Math.round(day.total_calories)} kcal</p>
            </div>
          </div>
          <div class="px-5 py-2">${mealsHtml}</div>
        </div>`;
    }).join('');
  }

  function renderHistoryChart(data) {
    const ctx = document.getElementById('historyChart');
    if (historyChart) historyChart.destroy();

    const labels = data.map(d => d.date.slice(5)).reverse();
    const calories = data.map(d => Math.round(d.total_calories)).reverse();

    historyChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: '칼로리 (kcal)',
          data: calories,
          backgroundColor: calories.map(c => c > 2500 ? 'rgba(248,113,113,0.7)' : 'rgba(52,211,153,0.7)'),
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, grid: { color: '#f3f4f6' }, ticks: { font: { size: 11 } } },
          x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 45 } }
        }
      }
    });
  }

  async function deleteMeal(mealId, btn) {
    if (!confirm('이 식사 기록을 삭제할까요?')) return;
    btn.disabled = true;
    const res = await fetch(`/api/meals/${mealId}`, { method: 'DELETE' });
    if (res.ok) {
      showToast('식사 기록이 삭제되었습니다');
      loadHistory();
    } else {
      showToast('삭제 실패', 'error');
      btn.disabled = false;
    }
  }

  // 초기 로드
  loadHistory();
</script>
{% endblock %}
